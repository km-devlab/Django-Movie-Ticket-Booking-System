{% extends "users/basic.html" %}
{% block title %}Login — BookMySeat{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="auth-card">
        <div class="auth-card-header">
          <h1><i class="fas fa-sign-in-alt me-2"></i>Welcome Back</h1>
        </div>
        <div class="auth-card-body">
          <form method="post" action="{% url 'login' %}{% if next %}?next={{ next|urlencode }}{% endif %}">
            {% csrf_token %}
            {% if next %}
                <input type="hidden" name="next" value="{{ next }}" />
            {% endif %}
            <div class="mb-3">
              <label for="{{ form.username.id_for_label }}" class="form-label">Username</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
                {{ form.username }}
              </div>
            </div>
            <div class="mb-4">
              <label for="{{ form.password.id_for_label }}" class="form-label">Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                {{ form.password }}
                <button
                  type="button"
                  class="btn btn-outline-secondary"
                  data-toggle-password="{{ form.password.id_for_label }}"
                  aria-label="Toggle password visibility"
                >
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
            <button type="submit" class="btn btn-cinema w-100">
              <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
          </form>
        </div>
        <div class="auth-card-footer">
          <a href="{% url 'password_reset' %}">Forgot password?</a>
          <hr class="border-secondary my-3" />
          <p class="mb-0">New here? <a href="{% url 'register' %}">Create an account</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
