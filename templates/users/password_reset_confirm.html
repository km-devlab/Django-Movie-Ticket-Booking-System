{% extends "users/basic.html" %}
{% block title %}Set New Password — BookMySeat{% endblock %}

{% block content %}
<section class="container py-5">
  <section class="row justify-content-center">
    <section class="col-md-6 col-lg-5">
      <section class="auth-card">
        <header class="auth-card-header">
          <h1><i class="fas fa-key me-2"></i>Set New Password</h1>
        </header>
        <section class="auth-card-body">
          <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <section class="mb-3">
              <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
              {{ field }}
              {% for error in field.errors %}
              <p class="invalid-feedback d-block mb-0">{{ error }}</p>
              {% endfor %}
            </section>
            {% endfor %}
            <button class="btn btn-cinema w-100" type="submit">Set New Password</button>
          </form>
        </section>
      </section>
    </section>
  </section>
</section>
{% endblock %}
