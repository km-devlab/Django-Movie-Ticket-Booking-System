{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="login-container" style="max-width: 400px; margin: 2rem auto; padding: 2rem; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9;">
  <h2 style="text-align:center; margin-bottom:1rem;">Login</h2>
  <form method="post" action="{% url 'login' %}?next={{ next|urlencode }}">
    {% csrf_token %}
            {% if next %}
                <input type="hidden" name="next" value="{{ next }}" />
            {% endif %}
    {{ form.as_p }}
    {% if next %}
      <input type="hidden" name="next" value="{{ next }}" />
    {% endif %}
    <button type="submit" style="width:100%; padding:0.5rem; background:#4a90e2; color:#fff; border:none; border-radius:4px; cursor:pointer;">
      Log in
    </button>
  </form>
</div>
{% endblock %}
